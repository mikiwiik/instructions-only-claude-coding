name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate-deps:
    name: Validate Pinned Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate npm pinned versions
        run: ./scripts/validate-pinned-deps.sh

      - name: Validate GitHub Actions versions
        run: ./scripts/validate-action-versions.sh

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Need full history to validate all PR commits

      - name: Validate PR commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs

  build:
    needs: validate-deps
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read      # Must re-declare: job-level permissions replace workflow-level
      pull-requests: write

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Security Audit
      if: matrix.os == 'ubuntu-latest'
      run: npm audit --audit-level=high

    - name: Install dependencies
      run: npm ci
      env:
        # Defense-in-depth: duplicates .npmrc ignore-scripts in case it's modified
        NPM_CONFIG_IGNORE_SCRIPTS: 'true'

    - name: Generate Security Audit Report
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      run: ./scripts/generate-audit-report.sh --audit-level=critical

    - name: Upload Security Audit Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      with:
        name: security-audit-report
        path: reports/
        retention-days: 30

    - name: Run type checking
      run: npm run type-check

    - name: Run linting
      run: npm run lint -- --max-warnings 1

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Coverage Threshold Check
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      run: |
        COVERAGE=$(node -p "Math.round(JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json')).total.lines.pct)")
        echo "Coverage: ${COVERAGE}%"
        if [ $COVERAGE -lt 90 ]; then
          echo "❌ Coverage ${COVERAGE}% is below 90% threshold"
          exit 1
        else
          echo "✅ Coverage ${COVERAGE}% meets 90% threshold"
        fi

    - name: Jest Coverage Comment
      uses: MishaKav/jest-coverage-comment@c480abe47ef4f7bcd87bd8b5e6043fdfb1c4d270 # v1.0.32
      if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        coverage-summary-path: ./coverage/coverage-summary.json
        junitxml-path: ./coverage/junit.xml
        junitxml-title: Test Results

    - name: Build application
      run: npm run build

    - name: Skip SonarCloud for Dependabot
      if: github.actor == 'dependabot[bot]'
      run: |
        echo "ℹ️  Skipping SonarCloud analysis for Dependabot PR"
        echo "📋 Reason: Dependabot PRs don't have access to SONAR_TOKEN secret"
        echo "✅ SonarCloud will run on main branch after merge"
        echo ""
        echo "All other quality checks (lint, test, type-check) still run on this PR"

    # SonarCloud analysis runs only once per PR on ubuntu job (not on macos)
    # Matrix conditions ensure it runs on ubuntu-latest only (SonarCloud requires Linux)
    # Dependabot check excludes Dependabot PRs (no access to SONAR_TOKEN secret)
    - name: Generate ESLint Report
      run: npm run lint -- --format json --output-file eslint-report.json || true
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'

    - name: SonarCloud Analysis
      uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v4.2.4
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x' && github.actor != 'dependabot[bot]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Upload coverage reports
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      with:
        name: coverage-report
        path: |
          coverage/
          !coverage/.nyc_output
        retention-days: 30

    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      with:
        name: build-artifacts
        path: |
          .next/
          !.next/cache/
        retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js 22.x
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      env:
        # Defense-in-depth: duplicates .npmrc ignore-scripts in case it's modified
        NPM_CONFIG_IGNORE_SCRIPTS: 'true'

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: npm run test:e2e
      env:
        CI: true
        USE_IN_MEMORY_STORE: 'true'  # Use in-memory store instead of Redis for E2E

    - name: Upload Playwright Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: playwright-test-results
        path: test-results/
        retention-days: 30

  build-summary:
      name: Build and Test
      runs-on: ubuntu-latest
      needs: [build, e2e-tests]
      if: always()

      steps:
      - name: Check build matrix success
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "All build matrix jobs and E2E tests completed successfully"
            exit 0
          else
            echo "One or more build matrix jobs or E2E tests failed"
            exit 1
          fi
